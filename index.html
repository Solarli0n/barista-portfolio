<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Dmitrii Afanasev — Barista in Berlin-Köpenick. 3+ years of daily practice in specialty espresso and latte art.">
<meta name="theme-color" content="#2c1a0e">
<title>Dmitrii Afanasev — Barista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #f5ede0; --espresso: #2c1a0e; --caramel: #b07d4a; --milk: #faf6f0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--milk); color: var(--espresso); overflow-x: hidden; }

  .lang-bar {
    position: fixed; top: 1.2rem; right: 1.5rem; z-index: 100;
    display: flex; background: rgba(44,26,14,0.75); backdrop-filter: blur(10px);
    border-radius: 4px; overflow: hidden; border: 1px solid rgba(176,125,74,0.3);
  }
  .lang-btn {
    padding: 0.4rem 0.85rem; font-size: 0.68rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(245,237,224,0.5); cursor: pointer;
    border: none; background: transparent; font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, background 0.2s;
  }
  .lang-btn.active { color: var(--cream); background: rgba(176,125,74,0.25); }
  .lang-btn:hover { color: var(--cream); }

  .section-label { font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--caramel); display: block; margin-bottom: 0.9rem; }
  .section-title { font-family: 'Playfair Display', serif; line-height: 1.15; margin-bottom: 1.4rem; }
  .section-title em { font-style: italic; color: var(--caramel); }
  .body-text { font-size: 1rem; line-height: 1.9; font-weight: 300; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.75s ease, transform 0.75s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ════════════ DESKTOP ════════════ */
  @media (min-width: 900px) {

    /* HERO */
    .hero {
      background: var(--espresso);
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      min-height: min(78vh, 860px);
      align-items: stretch;
      opacity: 0; animation: fadeUp 0.8s 0.1s forwards;
    }
    .hero-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(3.5rem, 6vw, 5.5rem) clamp(2.5rem, 5vw, 4.75rem) clamp(3.5rem, 6vw, 5.5rem) clamp(3rem, 7vw, 7rem);
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 4.4vw, 5rem);
      color: var(--cream);
      line-height: 0.98;
      margin-bottom: 1.6rem;
      white-space: normal;
      max-width: 10.5ch;
      text-wrap: balance;
    }
    .hero h1 em { font-style: italic; color: var(--caramel); }
    .hero-sub {
      font-size: 1.05rem;
      color: rgba(245,237,224,0.7);
      font-weight: 300;
      line-height: 1.8;
      max-width: 41rem;
      text-wrap: pretty;
    }
    .hero-photo {
      overflow: hidden;
      line-height: 0;
      min-height: 100%;
    }
    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .portrait-block { display: none; }
    .half-img { display: none; }

    /* TEXT blocks */
    .text-block,
    .text-block-dark,
    .ready-block {
      display: flex;
      justify-content: center;
      padding: 5rem 0;
    }

    .text-block { background: var(--milk); }
    .text-block-dark { background: var(--espresso); }
    .ready-block { background: var(--cream); }

    .text-block-inner,
    .text-block-dark .text-block-inner,
    .ready-block-inner {
      width: min(100%, 980px);
      padding: 0 clamp(2rem, 4vw, 3.5rem);
    }

    .text-block .section-title,
    .text-block-dark .section-title,
    .ready-block .section-title {
      font-size: clamp(2.15rem, 3vw, 3rem);
      max-width: 12ch;
    }

    .text-block .body-text,
    .text-block-dark .body-text,
    .ready-block .body-text {
      max-width: 44rem;
      font-size: 1.04rem;
      line-height: 1.82;
      text-wrap: pretty;
    }

    .text-block .body-text,
    .ready-block .body-text { color: #5a4535; }

    .text-block-dark .section-label { color: var(--caramel); }
    .text-block-dark .section-title { color: var(--cream); }
    .text-block-dark .body-text { color: rgba(245,237,224,0.7); }

    .full-img {
      padding: 0 clamp(2.5rem, 4vw, 4.5rem);
      background: var(--milk);
      line-height: 0;
    }
    .full-img-mobile { display: none; }
    .full-img-desktop { padding: 0 clamp(2.5rem, 4vw, 4.5rem); border-radius: 0; }
    .full-img img {
      width: 100%;
      display: block;
      height: auto;
      border-radius: 10px;
    }
    .full-img.full-bleed {
      padding: 0 clamp(2.5rem, 4vw, 4.5rem);
      background: var(--espresso);
      line-height: 0;
    }

    .latte-section {
      background: var(--espresso);
      padding: 5rem 0;
    }
    .latte-header {
      text-align: center;
      margin-bottom: 2.25rem;
      padding: 0 clamp(2rem, 4vw, 3rem);
    }
    .latte-header .section-label { color: rgba(176,125,74,0.75); }
    .latte-header .section-title {
      font-size: clamp(2.15rem, 3vw, 3rem);
      color: var(--cream);
      margin-bottom: 0.9rem;
    }
    .latte-desc {
      text-align: center;
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(245,237,224,0.65);
      font-weight: 300;
      max-width: 41rem;
      margin: 0 auto 3rem;
      text-wrap: pretty;
    }
    .latte-grid-img {
      width: min(100%, 1160px);
      margin: 0 auto;
      padding: 0 clamp(2rem, 4vw, 3rem);
    }
    .latte-grid-img img {
      width: 100%;
      display: block;
      height: auto;
      border-radius: 10px;
    }

    footer {
      padding: 3.5rem 2rem;
      background: var(--espresso);
      text-align: center;
    }
    footer p { color: rgba(245,237,224,0.3); font-size: 0.76rem; letter-spacing: 0.15em; margin-bottom: 0.6rem; }
    footer .contacts { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 0.8rem; }
    footer a { color: var(--caramel); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.08em; }
  }

  @media (min-width: 900px) and (max-width: 1199px) {
    .hero {
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.82fr);
      min-height: 72vh;
    }
    .hero-text {
      padding: 3.25rem 2.5rem 3.25rem 3.25rem;
    }
    .hero h1 {
      font-size: clamp(2.7rem, 4vw, 4rem);
      max-width: 9.8ch;
    }
    .hero-sub {
      max-width: 34rem;
      font-size: 1rem;
    }
    .text-block,
    .text-block-dark,
    .ready-block,
    .latte-section {
      padding: 4.5rem 0;
    }
  }

  /* ════════════ MOBILE ════════════ */
  @media (max-width: 899px) {
    .hero { background: var(--espresso); padding: 4rem 1.8rem 2.5rem; }
    .hero-photo { display: none; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.6rem, 9vw, 4rem); color: var(--cream); line-height: 1.06; margin-bottom: 1.2rem; opacity: 0; animation: fadeUp 0.7s 0.15s forwards; }
    .hero h1 em { font-style: italic; color: var(--caramel); }
    .hero-sub { font-size: 1rem; color: rgba(245,237,224,0.55); font-weight: 300; line-height: 1.8; opacity: 0; animation: fadeUp 0.7s 0.3s forwards; }
    .portrait-block { width: 100%; background: var(--espresso); opacity: 0; animation: fadeUp 0.9s 0.3s forwards; }
    .portrait-block img { width: 100%; display: block; object-fit: contain; object-position: center top; max-height: 92vh; background: var(--espresso); }
    .text-block { padding: 3.5rem 1.8rem; background: var(--milk); }
    .text-block-inner { max-width: 100%; }
    .text-block .section-title { font-size: clamp(1.8rem, 7vw, 2.4rem); }
    .text-block .body-text { color: #5a4535; }
    .text-block-dark { padding: 3.5rem 1.8rem; background: var(--espresso); }
    .text-block-dark .section-label { color: var(--caramel); }
    .text-block-dark .section-title { font-size: clamp(1.8rem, 7vw, 2.4rem); color: var(--cream); }
    .text-block-dark .body-text { color: rgba(245,237,224,0.6); }
    .full-img { width: 100%; line-height: 0; background: none; padding: 0; }
    .full-img-desktop { display: none; }
    .full-img-mobile { display: block; }
    .full-img img { width: 100%; display: block; height: auto; border-radius: 0; }
    .full-img.full-bleed { padding: 0; background: none; }
    .half-img { display: flex; justify-content: center; background: var(--espresso); padding: 0; line-height: 0; }
    .half-img img { width: 100%; display: block; height: auto; }
    .latte-section { background: var(--espresso); padding: 3.5rem 1.5rem; }
    .latte-header { text-align: center; margin-bottom: 1.5rem; }
    .latte-header .section-label { color: rgba(176,125,74,0.7); }
    .latte-header .section-title { font-size: clamp(1.8rem, 7vw, 2.4rem); color: var(--cream); margin-bottom: 0.8rem; }
    .latte-desc { text-align: center; font-size: 0.95rem; line-height: 1.8; color: rgba(245,237,224,0.55); font-weight: 300; margin: 0 0 2rem; }
    .latte-grid-img { width: 100%; padding: 0; }
    .latte-grid-img img { width: 100%; display: block; height: auto; }
    .ready-block { padding: 3.5rem 1.8rem; background: var(--cream); }
    .ready-block-inner { max-width: 100%; }
    .ready-block .section-title { font-size: clamp(1.8rem, 7vw, 2.4rem); }
    .ready-block .body-text { color: #5a4535; }
    footer { padding: 3rem 1.8rem; background: var(--espresso); text-align: center; }
    footer p { color: rgba(245,237,224,0.3); font-size: 0.76rem; letter-spacing: 0.12em; margin-bottom: 0.6rem; }
    footer .contacts { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.8rem; }
    footer a { color: var(--caramel); text-decoration: none; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-de" onclick="setLang('de')">DE</button>
</div>

<section class="hero">
  <div class="hero-text">
    <h1 data-en="Where craft<br>meets <em>intention.</em>" data-de="Wo Handwerk auf<br><em>Leidenschaft trifft.</em>"></h1>
    <p class="hero-sub"
       data-en="3+ years of daily practice in specialty espresso. Every morning a cup for my wife — every cup a small challenge to get better. I've built a setup, dialed in recipes, and learned latte art the hard way: one pour at a time. Now I'm ready to bring that dedication into a real cafe environment."
       data-de="Über 3 Jahre tägliche Praxis mit Specialty-Espresso. Jeden Morgen eine Tasse für meine Frau — jede Tasse eine kleine Herausforderung, besser zu werden. Ich habe ein Setup aufgebaut, Rezepte eingestellt und Latte Art auf die harte Tour gelernt: einen Einguss nach dem anderen. Jetzt bin ich bereit, diese Leidenschaft in eine echte Kaffeebar einzubringen."></p>

    <h2 class="section-title" data-en="Built on<br><em>precision.</em>" data-de="Aufgebaut auf<br><em>Präzision.</em>"></h2>
    <p class="body-text"
       data-en="Over 3+ years I built a practice around understanding extraction — dialing in grind size, dose and yield, learning what changes and why. Calibrated tamper, VST basket, WDT tool — every detail matters. I didn't just want a good-looking cup. I wanted to truly understand the craft."
       data-de="Über 3 Jahre habe ich eine Praxis aufgebaut, die auf dem Verständnis der Extraktion basiert — Mahlgrad, Dosis und Ausbeute einstellen, verstehen was sich verändert und warum. Kalibrierter Tamper, VST-Korb, WDT-Tool — jedes Detail zählt. Ich wollte nicht nur eine schön aussehende Tasse. Ich wollte das Handwerk wirklich verstehen."></p>

    <span class="section-label" data-en="Practice" data-de="Praxis"></span>
    <h2 class="section-title" data-en="Every morning<br><em>a new shot.</em>" data-de="Jeden Morgen<br><em>ein neuer Shot.</em>"></h2>
    <p class="body-text"
       data-en="For years I've made coffee for my wife every morning, for guests, for anyone who visits. That daily ritual taught me something no class could — how to show up consistently, stay curious, and genuinely care about what's in the cup. It's the kind of mindset I want to bring into a professional kitchen."
       data-de="Seit Jahren mache ich jeden Morgen Kaffee für meine Frau, für Gäste, für jeden der zu Besuch kommt. Dieses tägliche Ritual hat mir etwas beigebracht, das kein Kurs vermitteln kann — wie man konsequent dabei ist, neugierig bleibt und wirklich daran interessiert ist, was in der Tasse ist. Diese Einstellung möchte ich in eine professionelle Küche einbringen."></p>

    <h2 class="section-title" data-en="Ready for<br><em>the real thing.</em>" data-de="Bereit für<br><em>das Echte.</em>"></h2>
    <p class="body-text"
       data-en="Home practice has taken me far, but I know there's a ceiling. I want to learn from people who've made this their life, work in a real environment, and keep growing. That's why I'm looking for my first professional role as a barista."
       data-de="Die Praxis zu Hause hat mich weit gebracht, aber ich weiß, dass es Grenzen gibt. Ich möchte von Menschen lernen, die daraus ihr Leben gemacht haben, in einer echten Umgebung arbeiten und weiter wachsen. Deshalb suche ich meine erste professionelle Stelle als Barista."></p>

<script>
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  function setLang(lang) {
    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);
    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (text !== null) el.innerHTML = text;
    });
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-de').classList.toggle('active', lang === 'de');
  }

  const stored = localStorage.getItem('lang');
  const browserLang = navigator.language || navigator.userLanguage || 'en';
  setLang(stored || (browserLang.startsWith('de') ? 'de' : 'en'));
</script>
